name: ERP-Tool CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --workspaces --include-workspace-root --legacy-peer-deps

      - name: TypeScript Compile Verification
        run: |
          npm run build -w backend --if-present

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: erp_password
          POSTGRES_DB: erp_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --workspaces --include-workspace-root --legacy-peer-deps

      - name: Run Prisma Migrations
        env:
          DATABASE_URL: postgresql://erp_user:erp_password@localhost:5432/erp_db
        run: |
          cd backend
          npx prisma db push

      - name: Run Vitest Suite
        env:
          DATABASE_URL: postgresql://erp_user:erp_password@localhost:5432/erp_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: testsecretkey1234567890abcdefghijklmnopqr
          JWT_REFRESH_SECRET: testrefreshkey1234567890abcdefghijklmnopqr
        run: |
          cd backend
          npm run test --if-present

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --workspaces --include-workspace-root --legacy-peer-deps

      - name: Build Frontend React App
        run: |
          npm run build -w frontend

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t erp-backend:latest ./backend

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Announcement
        run: |
          echo "Simulating secure SSH deployment and application reload..."
