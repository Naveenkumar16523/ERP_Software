services:
  - type: web
    name: erp-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: erp-database
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: erp-redis
          property: connectionString
      - key: MONGODB_URL
        fromService:
          type: mongo
          name: erp-mongodb
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://erp-software-iyiexnm2x-naveenkumar16523s-projects.vercel.app

databases:
  - name: erp-database
    databaseName: erp_db
    user: erp_user
