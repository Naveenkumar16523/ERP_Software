services:
  - type: web
    name: erp-backend
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: REDIS_URL
        fromService:
          type: redis
          name: erp-redis
          property: connectionString
      - key: MONGODB_URL
        value: mongodb+srv://erp_db:<naveen16523>@cluster0.wu2gznn.mongodb.net/?appName=Cluster0
      - key: MONGODB_DB_NAME
        value: erp_database
      - key: NODE_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://erp-software-cyan.vercel.app
      - key: FRONTEND_ORIGIN
        value: https://erp-software-cyan.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: erp-database
    databaseName: erp_db
    user: erp_user
